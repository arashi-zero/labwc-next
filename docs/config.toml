# labwc-next config.toml
#
# Drop this file at ~/.config/labwc-next/config.toml.
# When present it is loaded instead of rc.xml.
#
# All values shown are the built-in defaults unless noted otherwise.
# Lines beginning with # are comments; omit any key to keep the default.

# ---------------------------------------------------------------------------
# [core]  General compositor behaviour
# ---------------------------------------------------------------------------
[core]

# Window decoration: "server" (SSD) or "client" (CSD)
decoration = "server"

# Gap in pixels between windows when using tiling/snapping
gap = 0

# Adaptive-sync (VRR): "disabled", "enabled", "fullscreen"
adaptive-sync = "disabled"

# Allow tearing for reduced latency: "disabled", "enabled",
# "fullscreen", "fullscreen-forced"
allow-tearing = "disabled"

# Automatically enable newly connected outputs
auto-enable-outputs = true

# Try to reuse last-known output mode instead of picking preferred
reuse-output-mode = false

# Keep XWayland server alive even when no X11 clients are connected
xwayland-persistence = false

# Enable primary selection (middle-click paste)
primary-selection = true

# Command used for interactive prompt actions (e.g. Execute with prompt)
# prompt-command = "bemenu-run"

# ---------------------------------------------------------------------------
# [placement]  Where new windows appear
# ---------------------------------------------------------------------------
[placement]

# Policy: "cascade", "center", "cursor", "fixed", "automatic"
policy = "cascade"

# Pixel offset for successive cascaded windows
cascade-offset-x = 0
cascade-offset-y = 0

# ---------------------------------------------------------------------------
# [focus]  Input focus behaviour
# ---------------------------------------------------------------------------
[focus]

# Move focus to the window under the pointer
follow-mouse = false

# Only follow mouse when the pointer actually moves (suppresses focus on scroll)
follow-mouse-requires-movement = true

# Raise focused window to top of stack automatically
raise-on-focus = false

# ---------------------------------------------------------------------------
# [theme]  Appearance
# ---------------------------------------------------------------------------
[theme]

# Name of the Openbox-compatible theme directory to load
# name = "Clearlooks-3.4"

# Icon theme name (XDG icon theme)
# icon-theme = "Papirus"

# Fallback icon name when an app has no icon
fallback-app-icon = "labwc-next"

# Rounded corner radius in pixels (0 = square)
corner-radius = 8

# Drop shadows under floating windows
drop-shadows = false

# Also draw drop shadows under tiled/snapped windows
drop-shadows-on-tiled = false

# Keep a thin border on maximized windows (so they can still be moved)
keep-border = true

# Decoration shown on maximized windows: "full" or "none"
maximized-decoration = "full"

# [theme.titlebar]
[theme.titlebar]

# Button layout string — colon separates left : right groups,
# comma-separated button names: iconify, max, close, shade, desk, menu, icon
layout = "iconify:max,close"

# Show the window title text in the titlebar
show-title = true

# [theme.font]  — applies to all locations at once
[theme.font]
name   = "sans"
size   = 10
weight = "normal"   # thin ultralight light semilight book medium semibold bold ultrabold heavy ultraheavy
slant  = "normal"   # normal italic oblique

# Per-location font overrides (uncomment to use)
# [theme.font.active]
# name = "sans"
# size = 10

# [theme.font.inactive]
# name = "sans"
# size = 10

# [theme.font.menu-header]
# name = "sans"
# size = 10

# [theme.font.menu-item]
# name = "sans"
# size = 10

# [theme.font.osd]
# name = "sans"
# size = 10

# ---------------------------------------------------------------------------
# [keyboard]  Key repeat and bindings
# ---------------------------------------------------------------------------
[keyboard]

# Key repeat rate (keys per second) and delay before repeat starts (ms)
repeat-rate  = 25
repeat-delay = 600

# Force numlock on at startup: true / false (unset = leave as-is)
# numlock = true

# Keyboard layout scope: "global" or "window"
layout-scope = "global"

# Keybindings — each entry is a table in the [[keyboard.keybind]] array.
# key:              XKB key name, with optional modifiers separated by -
#                   Modifiers: A=Alt, C=Ctrl, S=Shift, W=Super/Logo,
#                              H=Hyper, M=Meta
# on-release:       fire on key release instead of press (default false)
# layout-dependent: use layout symbols instead of keysyms (default false)
# allow-when-locked: allow binding even on locked screen (default false)
# actions:          array of action tables, each with at least "name"

[[keyboard.keybind]]
key = "A-F4"
actions = [{name = "Close"}]

[[keyboard.keybind]]
key = "A-F5"
actions = [{name = "ToggleMaximize"}]

[[keyboard.keybind]]
key = "W-Return"
actions = [{name = "Execute", command = "foot"}]

[[keyboard.keybind]]
key = "W-d"
actions = [{name = "Execute", command = "bemenu-run"}]

[[keyboard.keybind]]
key = "A-Tab"
actions = [{name = "NextWindow"}]

[[keyboard.keybind]]
key = "W-Left"
actions = [{name = "SnapToEdge", direction = "left"}]

[[keyboard.keybind]]
key = "W-Right"
actions = [{name = "SnapToEdge", direction = "right"}]

[[keyboard.keybind]]
key = "W-Up"
actions = [{name = "SnapToEdge", direction = "up"}]

[[keyboard.keybind]]
key = "W-Down"
actions = [{name = "SnapToEdge", direction = "down"}]

# ---------------------------------------------------------------------------
# [mouse]  Pointer settings and bindings
# ---------------------------------------------------------------------------
[mouse]

# Maximum time in ms between clicks to count as a double-click
double-click-time = 500

# Mouse bindings — each entry is a table in the [[mouse.mousebind]] array.
# context:   where the binding applies — Root, Frame, Titlebar, Title,
#            Client, Desktop, Border, Close, Maximize, Iconify, Shade,
#            AllDesktops, WindowMenu, Icon, TLCorner, TRCorner, BRCorner,
#            BLCorner, Top, Right, Bottom, Left, All
# button:    Left, Middle, Right, Side, Extra, Forward, Back, Task;
#            optionally prefixed with modifiers e.g. "A-Left"
# direction: Up, Down, Left, Right (for scroll gestures, instead of button)
# event:     Press, Release, Click, DoubleClick, Drag, Scroll
# actions:   same format as keyboard actions

[[mouse.mousebind]]
context = "Root"
button  = "Left"
event   = "Press"
actions = [{name = "Focus"}]

[[mouse.mousebind]]
context = "Root"
button  = "Right"
event   = "Press"
actions = [{name = "ShowMenu", menu = "root-menu"}]

[[mouse.mousebind]]
context = "Titlebar"
button  = "Left"
event   = "Drag"
actions = [{name = "Move"}]

[[mouse.mousebind]]
context = "Titlebar"
button  = "Left"
event   = "DoubleClick"
actions = [{name = "ToggleMaximize"}]

[[mouse.mousebind]]
context = "Titlebar"
button  = "Right"
event   = "Press"
actions = [{name = "ShowMenu", menu = "client-menu"}]

[[mouse.mousebind]]
context = "Frame"
button  = "A-Left"
event   = "Drag"
actions = [{name = "Move"}]

[[mouse.mousebind]]
context = "Frame"
button  = "A-Right"
event   = "Drag"
actions = [{name = "Resize"}]

[[mouse.mousebind]]
context = "Close"
button  = "Left"
event   = "Click"
actions = [{name = "Close"}]

[[mouse.mousebind]]
context = "Maximize"
button  = "Left"
event   = "Click"
actions = [{name = "ToggleMaximize"}]

[[mouse.mousebind]]
context = "Iconify"
button  = "Left"
event   = "Click"
actions = [{name = "Iconify"}]

# ---------------------------------------------------------------------------
# [workspace]  Virtual workspaces
# ---------------------------------------------------------------------------
[workspace]

# How long (ms) the workspace OSD popup is shown; -1 = until focus changes
popup-time = 1000

# Minimum number of workspaces to keep alive
min-count = 1

# Prefix used when auto-generating workspace names
# prefix = "Workspace "

# Name of the workspace to activate on startup
# initial = "1"

# Explicit workspace names (overrides min-count / prefix)
# names = ["1", "2", "3", "4"]

# ---------------------------------------------------------------------------
# [resistance]  Edge resistance for dragging and snapping
# ---------------------------------------------------------------------------
[resistance]

# Resistance strength against screen edges while moving (px)
screen-edge-strength = 20

# Resistance strength against other window edges while moving (px)
window-edge-strength = 20

# How far past a snap edge to drag before the window unsnaps (px)
unsnap-threshold = 20

# How far to drag down past the top of the screen before window unmaximizes (px)
unmaximize-threshold = 150

# ---------------------------------------------------------------------------
# [snapping]  Edge-snapping / tiling
# ---------------------------------------------------------------------------
[snapping]

# Detection range inside the screen edge (px)
range-inner = 10

# Detection range outside the screen area (px, for multi-monitor gaps)
range-outer = 10

# Corner hot-zone size (px)
corner-range = 50

# Dragging to the very top edge maximizes the window
top-maximize = true

# Send xdg-tiling-state hints to clients:
# "always", "region" (only when region-snapped), "edge", "never"
notify-client = "always"

# [snapping.overlay]  Visual preview shown while dragging near an edge
[snapping.overlay]
enabled     = true
delay-inner = 500   # ms before overlay appears for inner-range snaps
delay-outer = 500   # ms before overlay appears for outer-range snaps

# ---------------------------------------------------------------------------
# [theme.colors]  SSD / UI colors (all default values shown)
#
# Colors are #RRGGBB or #RRGGBBAA (alpha, pre-multiplied by compositor).
# Omit any key to keep the built-in default.
# ---------------------------------------------------------------------------

[theme.colors]
border-width = 1

# ---------------------------------------------------------------------------
# [theme.colors.window]  Titlebar geometry shared by active + inactive
# ---------------------------------------------------------------------------
[theme.colors.window]
titlebar-padding-width  = 0
titlebar-padding-height = 0
# Thin line at the bottom edge of the titlebar (0 = disabled)
# titlebar-bottom-border-width = 1
# titlebar-bottom-border-width = 1  # px; 0 = disabled (default)

# Text justify: "left", "center", "right"
title-justify = "center"

# Indicator shown when global keybinds are toggled off (ToggleKeybinds action)
toggled-keybind-indicator = "#ff0000"

# Button geometry (shared)
[theme.colors.window.button]
width               = 26    # button hit area width in pixels
height              = 26    # button hit area height in pixels
spacing             = 0     # gap between buttons in pixels
icon-size           = 0     # icon size in pixels; 0 = fill button area
                            # when set, the icon is centered inside the button
                            # works best with SVGs in ~/.config/labwc-next/icons/
hover-bg-size       = 0     # hover background size in pixels; 0 = fill button area
                            # when set, the hover bg is centered inside the button
app-icon-size       = 0     # app icon size in pixels; 0 = legacy formula (80% width, full height)
                            # when set, the app icon is centered inside the button
hover-bg            = "#80808020"
hover-corner-radius = 0

# ---------------------------------------------------------------------------
# [theme.colors.window.active]  Focused window
# ---------------------------------------------------------------------------
[theme.colors.window.active]
border      = "#aaaaaa"
# titlebar-bottom-border-color = "#aaaaaa"  # defaults to border color
title-bg    = "#e1dedb"
# title-bg-gradient = "none"   # "none", "vertical", "splitvertical"
# title-bg-to        = "#..."  # gradient end color
# title-bg-split-to  = "#..."  # SplitVertical top-right / bottom-left
# title-bg-to-split-to = "#..." # SplitVertical bottom-right
title-text       = "#000000"
shadow-size      = 60
shadow-color     = "#00000060"

[theme.colors.window.active.button]
all          = "#000000"   # sets all button icon colors at once
# Per-button overrides (uncomment to use):
# close       = "#cc0000"
# maximize    = "#000000"
# minimize    = "#000000"
# shade       = "#000000"
# omnipresent = "#000000"
# menu        = "#000000"
# Hover icon color overrides — applied on cursor hover via ATOP recolor
# Works for both SVG user icons and XBM/bitmap fallbacks.
# If not set, inherits the normal button color.
# hover-all         = "#ffffff"
# hover-close       = "#ff5f57"
# hover-maximize    = "#28c840"
# hover-minimize    = "#febc2e"
# hover-shade       = "#ffffff"
# hover-omnipresent = "#ffffff"
# hover-menu        = "#ffffff"

# ---------------------------------------------------------------------------
# [theme.colors.window.inactive]  Unfocused windows
# ---------------------------------------------------------------------------
[theme.colors.window.inactive]
border      = "#aaaaaa"
# titlebar-bottom-border-color = "#aaaaaa"  # defaults to border color
title-bg    = "#f6f5f4"
title-text  = "#000000"
shadow-size = 40
shadow-color = "#00000040"

[theme.colors.window.inactive.button]
all = "#000000"
# hover-all = "#ffffff"   # same hover-* keys supported as active button

# ---------------------------------------------------------------------------
# [theme.colors.menu]  Right-click and client menus
# ---------------------------------------------------------------------------
[theme.colors.menu]
overlap-x              = 0
overlap-y              = 0
min-width              = 20
max-width              = 200
border-width           = 1
# Rounded corners for the outer menu background (0 = square)
# For clean corners, set border-width >= corner-radius, or combine with shadows
# corner-radius        = 0
border                 = "#aaaaaa"
bg                     = "#fcfbfa"
text                   = "#000000"
active-bg              = "#e1dedb"
active-text            = "#000000"
# Rounded corners for the active item highlight (0 = square)
# active-bg-corner-radius = 4
# Inset padding for the active item highlight (0 = full item width/height)
# active-bg-padding-x  = 4
# active-bg-padding-y  = 2
# Outer padding — space between border and first/last item
padding-y              = 0   # top and bottom
padding-x              = 0   # left and right
item-padding-x         = 7
item-padding-y         = 4
# Extra left padding added before the label text (default 0)
# Has no effect when text-justify = "center"
# text-padding-x       = 0
# Text justification within the item: "left" or "center"
# text-justify         = "left"
separator-width        = 1
separator-padding-width  = 6
separator-padding-height = 3
separator-color        = "#888888"
title-bg               = "#589bda"
title-text             = "#ffffff"
title-justify          = "center"

# ---------------------------------------------------------------------------
# [theme.colors.osd]  On-screen display (window switcher, workspace popup)
# ---------------------------------------------------------------------------
[theme.colors.osd]
bg           = "#e1dedb"
border       = "#000000"
border-width = 1
text         = "#000000"

# [theme.colors.osd.switcher-classic]  Alt-Tab classic list style
[theme.colors.osd.switcher-classic]
width                  = 600   # px (or set width-percent for a % of screen)
padding                = 4
item-padding-x         = 10
item-padding-y         = 1
item-active-border-width = 2
item-active-border     = "#706f6d"
item-active-bg         = "#bfbcba"
item-active-text       = "#000000"   # defaults to osd text color
# item-icon-size       = 16    # defaults to font size

# [theme.colors.osd.switcher-thumbnail]  Alt-Tab thumbnail grid style
[theme.colors.osd.switcher-thumbnail]
# max-width              = 80   # use max-width-percent instead for %
item-width             = 300
item-height            = 250
item-padding           = 10
item-active-border-width = 2
item-active-border     = "#706f6d"
item-active-bg         = "#bfbcba"
item-active-text       = "#000000"   # defaults to osd text color
item-icon-size         = 60

# [theme.colors.osd.preview]  Border drawn around previewed windows
[theme.colors.osd.preview]
border-width  = 1
# border-colors = ["#dddda6", "#000000", "#dddda6"]  # up to 3 colors

# [theme.colors.osd.workspace-switcher]  Workspace popup boxes
[theme.colors.osd.workspace-switcher]
boxes-width        = 20
boxes-height       = 20
boxes-border-width = 2

# ---------------------------------------------------------------------------
# [theme.colors.snapping]  Edge-snap overlay colors
# ---------------------------------------------------------------------------
[theme.colors.snapping]

# "region" = snapping to a defined region; "edge" = snapping to screen edge.
# bg-enabled / border-enabled defaults depend on the renderer:
#   hardware renderers: bg on, border off
#   software/pixman:    bg off, border on

[theme.colors.snapping.region]
bg-enabled     = true
border-enabled = false
bg             = "#8080b380"
border-width   = 1
# border-colors = ["#8080b3ff", "#8080b3ff", "#8080b3ff"]

[theme.colors.snapping.edge]
bg-enabled     = true
border-enabled = false
bg             = "#8080b380"
border-width   = 1
# border-colors = ["#8080b3ff", "#8080b3ff", "#8080b3ff"]

# ---------------------------------------------------------------------------
# [theme.colors.magnifier]  Screen magnifier border
# ---------------------------------------------------------------------------
[theme.colors.magnifier]
border-width = 1
border       = "#ff0000"

# ---------------------------------------------------------------------------
# [[menu]]  Static menu definitions
#
# Any number of [[menu]] blocks can appear in any *.toml file.
# They are loaded before menu.xml, so TOML menus take precedence.
#
# Supported item types (inside [[menu.item]]):
#   separator = true           — plain separator line
#   separator = "Label"        — titled separator
#   label + actions            — regular item
#   label + submenu = "id"     — link to another menu by id
#   label + execute = "cmd"    — pipemenu
#   label + [[menu.item.item]] — inline nested submenu
# ---------------------------------------------------------------------------

# [[menu]]
# id    = "root-menu"
# label = "Root"
#
# [[menu.item]]
# label   = "Terminal"
# actions = [{name = "Execute", command = "foot"}]
#
# [[menu.item]]
# separator = true
#
# [[menu.item]]
# label   = "Reconfigure"
# actions = [{name = "Reconfigure"}]
#
# [[menu.item]]
# label   = "Exit"
# actions = [{name = "Exit"}]
